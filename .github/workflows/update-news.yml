name: Update Daily News

permissions:
  contents: write

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependency
        run: npm install rss-parser

      - name: Fetch news
        run: node scripts/fetch-news.js

      - name: Generate MCQ
        run: node scripts/generate-mcq.js

      - name: Commit and push changes
        run: |
          git config --global user.name "news-bot"
          git config --global user.email "bot@example.com"
          git add .
          git commit -m "update daily news" || echo "No changes"
          git push
