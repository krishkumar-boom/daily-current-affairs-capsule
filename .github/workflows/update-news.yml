name: Update Daily News

permissions:
 contents: write

on:
 schedule:
  - cron: "0 3 * * *"
 workflow_dispatch:

jobs:
 update:
  runs-on: ubuntu-latest

  steps:
   - uses: actions/checkout@v3

   - name: Setup Node
     uses: actions/setup-node@v3
     with:
       node-version: 18

   - name: Install dependencies
     run: |
      npm install
      npm install rss-parser
      npm install pdfkit
      npm install node-fetch form-data
      
   - name: Fetch news
     run: node scripts/fetch-news.js

   - name: Generate current affairs
     run: node scripts/generate-ca.js

   - name: Generate MCQ
     run: node scripts/generate-mcq.js
   - name: Generate MCQ
     run: node scripts/generate-mcq.js

   - name: Send MCQ to Telegram
     run: node scripts/send-mcq.js
     env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
   - name: Send Poll Quiz
     run: node scripts/send-poll.js
     env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
 
   - name: Generate PDF
     run: node scripts/generate-pdf.js

   - name: Send PDF to Telegram
     run: node scripts/send-telegram.js
     env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      
   - name: Commit changes
     run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"
      git add .
      git commit -m "update daily news" || echo "No changes"
      git push
