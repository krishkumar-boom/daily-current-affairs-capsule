name: Update Daily News

permissions:
contents: write

on:
schedule:
- cron: "0 3 * * *"
workflow_dispatch:

jobs:
update:
runs-on: ubuntu-latest

steps:
  - uses: actions/checkout@v3

  - name: Setup Node
    uses: actions/setup-node@v3
    with:
      node-version: 18

  - name: Install dependencies
    run: |
      npm install
      npm install rss-parser
      npm install pdfkit

  - name: Fetch news
    run: node scripts/fetch-news.js

  - name: Generate current affairs
    run: node scripts/generate-ca.js

  - name: Generate MCQ
    run: node scripts/generate-mcq.js

  - name: Generate PDF
    run: node scripts/generate-pdf.js

  - name: Commit changes
    run: |
      git config --global user.name "github-actions[bot]"
      git config --global user.email "github-actions[bot]@users.noreply.github.com"
      git add .
      git commit -m "update daily news" || echo "No changes"
      git push
